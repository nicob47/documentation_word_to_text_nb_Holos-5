<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2400" viewBox="0 0 1200 2400">
  <defs>
    <style>
      .title-font { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: bold; fill: #1F2937; }
      .label-font { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1F2937; }
      .small-font { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; }
      .badge-text { font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: bold; fill: #FFFFFF; }
      .header-text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .field-value { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1F2937; }
      .section-title { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: bold; fill: #1F2937; }
      .card-desc { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; font-style: italic; }
      .stakeholder-title { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: bold; fill: #1F2937; }
      .stakeholder-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #374151; }
      .kv-label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; }
      .kv-value { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: bold; fill: #1F2937; }
      .defaults-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #9CA3AF; font-style: italic; }
      .pencil-icon { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #6B7280; cursor: pointer; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="2400" fill="#F9FAFB"/>

  <!-- ==================== STEP 1 (y=20) ==================== -->
  <rect x="30" y="20" width="1140" height="140" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="35" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="50" text-anchor="middle" class="badge-text">Step 1</text>
  <text x="115" y="51" class="title-font">Rotation Overview</text>

  <text x="60" y="85" class="label-font" font-weight="bold">Name:</text>
  <text x="108" y="85" class="field-value">Crop Rotation test</text>
  <text x="290" y="85" class="label-font" font-weight="bold">Start:</text>
  <text x="330" y="85" class="field-value">1907</text>
  <text x="400" y="85" class="label-font" font-weight="bold">End:</text>
  <text x="432" y="85" class="field-value">2026</text>
  <text x="500" y="85" class="label-font" font-weight="bold">Field size:</text>
  <text x="565" y="85" class="field-value">50 ha</text>

  <rect x="100" y="100" width="170" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="110" y="120" class="field-value">Crop Rotation test</text>
  <rect x="320" y="100" width="60" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="330" y="120" class="field-value">1907</text>
  <rect x="420" y="100" width="60" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="430" y="120" class="field-value">2026</text>
  <rect x="540" y="100" width="70" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="550" y="120" class="field-value">50 ha</text>

  <!-- ==================== STEP 2 (y=180) ==================== -->
  <rect x="30" y="180" width="1140" height="250" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="195" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="210" text-anchor="middle" class="badge-text">Step 2</text>
  <text x="115" y="211" class="title-font">Build Your Rotation Sequence</text>

  <rect x="50" y="230" width="110" height="30" rx="5" fill="#26428B"/>
  <text x="105" y="250" text-anchor="middle" class="header-text">+ Add Crop</text>
  <text x="180" y="250" class="small-font">Crops in sequence: 2</text>

  <!-- Timeline card 1 -->
  <rect x="50" y="270" width="520" height="65" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="65" y="295" class="label-font" font-weight="bold">1907</text>
  <rect x="110" y="280" width="80" height="24" rx="4" fill="#E8F0FE"/>
  <text x="150" y="296" text-anchor="middle" class="label-font">Wheat</text>
  <text x="210" y="296" class="small-font">Cover crop:</text>
  <rect x="280" y="280" width="90" height="24" rx="4" fill="#E8F4E8"/>
  <text x="325" y="296" text-anchor="middle" style="font-family:Arial;font-size:12px;fill:#4CAF50">Rapeseed</text>

  <!-- Timeline card 2 -->
  <rect x="50" y="345" width="520" height="65" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="65" y="370" class="label-font" font-weight="bold">1908</text>
  <rect x="110" y="355" width="80" height="24" rx="4" fill="#E8F0FE"/>
  <text x="150" y="371" text-anchor="middle" class="label-font">DryPeas</text>
  <text x="210" y="371" class="small-font">Cover crop:</text>
  <rect x="280" y="355" width="100" height="24" rx="4" fill="#E8F4E8"/>
  <text x="330" y="371" text-anchor="middle" style="font-family:Arial;font-size:12px;fill:#4CAF50">PigeonBean</text>

  <!-- ==================== STEP 3 (y=450) ==================== -->
  <rect x="30" y="450" width="1140" height="380" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="465" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="480" text-anchor="middle" class="badge-text">Step 3</text>
  <text x="115" y="481" class="title-font">Preview Field Assignments</text>

  <rect x="50" y="505" width="1100" height="30" rx="0" fill="#26428B"/>
  <text x="100" y="525" class="header-text">Field</text>
  <text x="230" y="525" text-anchor="middle" class="header-text">1907</text>
  <text x="380" y="525" text-anchor="middle" class="header-text">1908</text>
  <text x="530" y="525" text-anchor="middle" class="header-text">1909</text>
  <text x="680" y="525" text-anchor="middle" class="header-text">1910</text>
  <text x="830" y="525" text-anchor="middle" class="header-text">1911</text>

  <rect x="50" y="540" width="100" height="120" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="100" y="605" text-anchor="middle" class="label-font" font-weight="bold">Field 1</text>

  <rect x="155" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="227" y="575" text-anchor="middle" class="label-font" font-weight="bold">Wheat</text>
  <text x="227" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: Rapeseed</text>

  <rect x="305" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="377" y="575" text-anchor="middle" class="label-font" font-weight="bold">DryPeas</text>
  <text x="377" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: PigeonBean</text>

  <rect x="455" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="527" y="575" text-anchor="middle" class="label-font" font-weight="bold">Wheat</text>
  <text x="527" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: Rapeseed</text>

  <rect x="605" y="540" width="145" height="120" fill="#E8F0FE" stroke="#26428B" stroke-width="2"/>
  <text x="677" y="575" text-anchor="middle" class="label-font" font-weight="bold">DryPeas</text>
  <text x="677" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: PigeonBean</text>

  <rect x="755" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="827" y="575" text-anchor="middle" class="label-font" font-weight="bold">Wheat</text>
  <text x="827" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: Rapeseed</text>

  <rect x="50" y="665" width="100" height="60" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="100" y="700" text-anchor="middle" class="label-font" font-weight="bold">Field 2</text>
  <rect x="155" y="665" width="745" height="60" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="527" y="700" text-anchor="middle" class="small-font">No crops assigned</text>

  <!-- Divider -->
  <line x1="30" y1="845" x2="1170" y2="845" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- ==================== STEP 4 (y=860) — SUMMARY CARD ==================== -->
  <rect x="30" y="860" width="1140" height="1080" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="875" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="890" text-anchor="middle" class="badge-text">Step 4</text>
  <text x="115" y="891" class="title-font">Edit Crop Details</text>

  <!-- Currently editing header -->
  <rect x="50" y="910" width="1100" height="36" rx="6" fill="#E8F0FE" stroke="#26428B" stroke-width="1"/>
  <text x="65" y="933" style="font-family:Arial;font-size:14px;font-weight:bold;fill:#26428B">DryPeas (1910) — Field 1 | Main Crop &#x25BC;</text>

  <!-- Summary card container -->
  <rect x="50" y="960" width="1100" height="830" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>

  <!-- ====== Section 1: General (read-only) ====== -->
  <text x="70" y="990" class="section-title">General</text>
  <text x="1120" y="990" text-anchor="end" class="pencil-icon">&#x270F;</text>
  <!-- Row 1 -->
  <text x="70" y="1018" class="kv-label">Yield:</text>
  <text x="105" y="1018" class="kv-value">1000.0 kg/ha</text>
  <text x="280" y="1018" class="kv-label">Dry yield:</text>
  <text x="340" y="1018" class="kv-value">0.00</text>
  <text x="420" y="1018" class="kv-label">Moisture:</text>
  <text x="485" y="1018" class="kv-value">12.0%</text>
  <!-- Row 2 -->
  <text x="70" y="1042" class="kv-label">Tillage:</text>
  <text x="115" y="1042" class="kv-value">Reduced</text>
  <text x="280" y="1042" class="kv-label">Harvest:</text>
  <text x="335" y="1042" class="kv-value">Cash crop</text>
  <text x="420" y="1042" class="kv-label">Irrigation:</text>
  <text x="485" y="1042" class="kv-value">0.0 mm</text>
  <!-- Divider -->
  <line x1="60" y1="1060" x2="1140" y2="1060" stroke="#D1D5DB" stroke-width="1"/>

  <!-- ====== Section 2: Fertilizer (EXPANDED / editing) ====== -->
  <rect x="55" y="1070" width="1090" height="130" rx="4" fill="#E8F0FE"/>
  <text x="70" y="1098" class="section-title">Fertilizer</text>
  <text x="1120" y="1098" text-anchor="end" class="pencil-icon" style="fill:#26428B">&#x270F;</text>
  <text x="155" y="1098" style="font-family:Arial;font-size:11px;fill:#26428B;font-style:italic">Editing...</text>

  <!-- Editable fields -->
  <text x="70" y="1130" class="label-font">Fertilizer type</text>
  <rect x="70" y="1138" width="150" height="28" rx="4" fill="#FFFFFF" stroke="#26428B" stroke-width="1"/>
  <text x="80" y="1157" class="field-value">Urea &#x25BC;</text>

  <text x="250" y="1130" class="label-font">Rate</text>
  <rect x="250" y="1138" width="110" height="28" rx="4" fill="#FFFFFF" stroke="#26428B" stroke-width="1"/>
  <text x="260" y="1157" class="field-value">50.0</text>
  <text x="367" y="1157" class="small-font">kg/ha</text>

  <text x="420" y="1130" class="label-font">Season</text>
  <rect x="420" y="1138" width="130" height="28" rx="4" fill="#FFFFFF" stroke="#26428B" stroke-width="1"/>
  <text x="430" y="1157" class="field-value">Spring &#x25BC;</text>

  <!-- Save / Cancel buttons -->
  <rect x="70" y="1173" width="60" height="24" rx="4" fill="#26428B"/>
  <text x="100" y="1189" text-anchor="middle" style="font-family:Arial;font-size:12px;font-weight:bold;fill:#FFFFFF">Save</text>
  <rect x="140" y="1173" width="65" height="24" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="172" y="1189" text-anchor="middle" style="font-family:Arial;font-size:12px;fill:#6B7280">Cancel</text>

  <!-- Divider -->
  <line x1="60" y1="1210" x2="1140" y2="1210" stroke="#D1D5DB" stroke-width="1"/>

  <!-- ====== Section 3: Manure ====== -->
  <text x="70" y="1240" class="section-title">Manure</text>
  <text x="1120" y="1240" text-anchor="end" class="pencil-icon">&#x270F;</text>
  <text x="70" y="1262" class="defaults-text">No manure applied — using defaults</text>
  <line x1="60" y1="1280" x2="1140" y2="1280" stroke="#D1D5DB" stroke-width="1"/>

  <!-- ====== Section 4: Grazing ====== -->
  <text x="70" y="1310" class="section-title">Grazing</text>
  <text x="1120" y="1310" text-anchor="end" class="pencil-icon">&#x270F;</text>
  <text x="70" y="1332" class="defaults-text">No grazing — using defaults</text>
  <line x1="60" y1="1350" x2="1140" y2="1350" stroke="#D1D5DB" stroke-width="1"/>

  <!-- ====== Section 5: Soil ====== -->
  <text x="70" y="1380" class="section-title">Soil</text>
  <text x="1120" y="1380" text-anchor="end" class="pencil-icon">&#x270F;</text>
  <text x="70" y="1405" class="kv-label">Sand:</text>
  <text x="105" y="1405" class="kv-value">45%</text>
  <text x="190" y="1405" class="kv-label">Clay:</text>
  <text x="225" y="1405" class="kv-value">25%</text>
  <text x="310" y="1405" class="kv-label">Organic matter:</text>
  <text x="410" y="1405" class="kv-value">3.2%</text>
  <line x1="60" y1="1425" x2="1140" y2="1425" stroke="#D1D5DB" stroke-width="1"/>

  <!-- ====== Section 6: Residue ====== -->
  <text x="70" y="1455" class="section-title">Residue</text>
  <text x="1120" y="1455" text-anchor="end" class="pencil-icon">&#x270F;</text>
  <text x="70" y="1477" class="defaults-text">Using default residue parameters</text>
  <line x1="60" y1="1495" x2="1140" y2="1495" stroke="#D1D5DB" stroke-width="1"/>

  <!-- ====== Section 7: Economics ====== -->
  <text x="70" y="1525" class="section-title">Economics</text>
  <text x="1120" y="1525" text-anchor="end" class="pencil-icon">&#x270F;</text>
  <text x="70" y="1547" class="defaults-text">Economic analysis not configured</text>

  <!-- ==================== STAKEHOLDER TEXT ==================== -->
  <rect x="30" y="1960" width="1140" height="280" rx="8" fill="#FFF8F0" stroke="#C26A1B" stroke-width="1"/>
  <text x="50" y="1990" class="stakeholder-title">Current State:</text>
  <text x="50" y="2010" class="stakeholder-text">Currently, Step 4 shows all 7 tabs simultaneously (General, Fertilizer, Manure, Grazing, Soil, Residue,</text>
  <text x="50" y="2028" class="stakeholder-text">Economics), regardless of whether the user needs them. Users must scroll through many irrelevant input fields.</text>

  <text x="50" y="2060" class="stakeholder-title">Proposed Change:</text>
  <text x="50" y="2080" class="stakeholder-text">This summary card approach shows all current values at a glance in a compact, read-only format — like a</text>
  <text x="50" y="2098" class="stakeholder-text">receipt or invoice. Each section has an edit button that expands it inline for editing. Sections using defaults</text>
  <text x="50" y="2116" class="stakeholder-text">show 'Using defaults' in gray, making it immediately clear what has been customized. Users can scan all</text>
  <text x="50" y="2134" class="stakeholder-text">settings without scrolling through empty forms.</text>
</svg>