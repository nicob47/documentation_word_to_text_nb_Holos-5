<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2320" viewBox="0 0 1200 2320">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 18px; font-weight: 600; fill: #1F2937; }
      .subtitle { font-size: 14px; fill: #6B7280; }
      .label { font-size: 13px; fill: #1F2937; }
      .value { font-size: 13px; fill: #6B7280; }
      .small { font-size: 11px; fill: #6B7280; }
      .badge-text { font-size: 12px; fill: #FFFFFF; font-weight: 700; }
      .crop-name { font-size: 13px; font-weight: 600; fill: #1F2937; }
      .cover-crop { font-size: 11px; fill: #4CAF50; font-style: italic; }
      .year-text { font-size: 11px; fill: #6B7280; }
      .tab-text { font-size: 13px; fill: #6B7280; }
      .tab-active { font-size: 13px; fill: #26428B; font-weight: 600; }
      .field-label { font-size: 13px; fill: #1F2937; font-weight: 600; }
      .btn-text { font-size: 13px; fill: #FFFFFF; font-weight: 600; }
      .header-text { font-size: 16px; fill: #FFFFFF; font-weight: 600; }
      .annotation { font-size: 12px; fill: #C26A1B; font-style: italic; }
      .tree-item { font-size: 12px; fill: #1F2937; }
      .tree-cover { font-size: 12px; fill: #4CAF50; }
      .tree-header { font-size: 13px; fill: #1F2937; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="2320" fill="#F9FAFB" />

  <!-- ==================== STEP 1: Rotation Overview ==================== -->
  <rect x="40" y="20" width="56" height="24" rx="12" fill="#C26A1B" />
  <text x="68" y="36" text-anchor="middle" class="badge-text">Step 1</text>
  <text x="106" y="37" class="title">Rotation Overview</text>

  <rect x="40" y="55" width="1120" height="120" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="60" y="85" class="label" font-weight="600">Name:</text>
  <text x="110" y="85" class="value">Crop Rotation test</text>
  <text x="340" y="85" class="label" font-weight="600">Start Year:</text>
  <text x="420" y="85" class="value">1907</text>
  <text x="540" y="85" class="label" font-weight="600">End Year:</text>
  <text x="615" y="85" class="value">2026</text>
  <text x="740" y="85" class="label" font-weight="600">Field Size:</text>
  <text x="815" y="85" class="value">50 ha</text>

  <!-- ==================== STEP 2: Build Your Rotation Sequence ==================== -->
  <rect x="40" y="200" width="56" height="24" rx="12" fill="#C26A1B" />
  <text x="68" y="216" text-anchor="middle" class="badge-text">Step 2</text>
  <text x="106" y="217" class="title">Build Your Rotation Sequence</text>

  <rect x="40" y="240" width="110" height="32" rx="6" fill="#26428B" />
  <text x="95" y="261" text-anchor="middle" class="btn-text">+ Add Crop</text>
  <text x="170" y="261" class="subtitle">Crops in sequence: 2</text>

  <text x="40" y="300" class="label" font-weight="600">Rotation Timeline</text>

  <!-- Card 1: 1907 Wheat -->
  <rect x="40" y="312" width="520" height="160" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="60" y="338" class="year-text">Year: 1907</text>
  <text x="60" y="365" class="label">Select crop</text>
  <rect x="60" y="372" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="70" y="392" class="value">Wheat</text>
  <text x="240" y="392" class="small">&#x25BC;</text>
  <rect x="60" y="415" width="14" height="14" rx="2" fill="#26428B" stroke="#26428B" stroke-width="1" />
  <text x="62" y="426" font-size="10" fill="#FFFFFF" font-weight="700">&#x2713;</text>
  <text x="82" y="427" class="label">Cover Crop</text>
  <text x="60" y="452" class="label">Cover Crop Type</text>
  <rect x="60" y="458" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="70" y="478" class="value">Rapeseed</text>
  <text x="240" y="478" class="small">&#x25BC;</text>

  <!-- Card 2: 1908 DryPeas -->
  <rect x="580" y="312" width="520" height="160" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="600" y="338" class="year-text">Year: 1908</text>
  <text x="600" y="365" class="label">Select crop</text>
  <rect x="600" y="372" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="610" y="392" class="value">DryPeas</text>
  <text x="780" y="392" class="small">&#x25BC;</text>
  <rect x="600" y="415" width="14" height="14" rx="2" fill="#26428B" stroke="#26428B" stroke-width="1" />
  <text x="602" y="426" font-size="10" fill="#FFFFFF" font-weight="700">&#x2713;</text>
  <text x="622" y="427" class="label">Cover Crop</text>
  <text x="600" y="452" class="label">Cover Crop Type</text>
  <rect x="600" y="458" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="610" y="478" class="value">PigeonBean</text>
  <text x="780" y="478" class="small">&#x25BC;</text>
  <rect x="1040" y="322" width="50" height="26" rx="4" fill="#FEE2E2" />
  <text x="1065" y="340" text-anchor="middle" font-size="12" fill="#DC2626" font-weight="600">Delete</text>

  <!-- ==================== STEP 3: Preview Field Assignments ==================== -->
  <rect x="40" y="510" width="56" height="24" rx="12" fill="#C26A1B" />
  <text x="68" y="526" text-anchor="middle" class="badge-text">Step 3</text>
  <text x="106" y="527" class="title">Preview Field Assignments</text>

  <rect x="40" y="550" width="1120" height="300" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />

  <text x="60" y="580" class="label" font-weight="600">Field</text>
  <text x="227" y="575" text-anchor="middle" class="year-text">1907</text>
  <text x="407" y="575" text-anchor="middle" class="year-text">1908</text>
  <text x="587" y="575" text-anchor="middle" class="year-text">1909</text>
  <text x="767" y="575" text-anchor="middle" class="year-text">1910</text>
  <text x="947" y="575" text-anchor="middle" class="year-text">1911</text>

  <line x1="40" y1="590" x2="1160" y2="590" stroke="#D1D5DB" stroke-width="1" />

  <!-- Field 1 -->
  <text x="60" y="630" class="field-label">Field 1</text>
  <rect x="147" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="227" y="625" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="227" y="645" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <rect x="327" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="407" y="625" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="407" y="645" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <rect x="507" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="587" y="625" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="587" y="645" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <rect x="687" y="600" width="160" height="70" rx="6" fill="#E8F0FE" stroke="#26428B" stroke-width="2" />
  <text x="767" y="625" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="767" y="645" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <rect x="867" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="947" y="625" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="947" y="645" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <line x1="50" y1="685" x2="1150" y2="685" stroke="#D1D5DB" stroke-width="1" />

  <!-- Field 2 -->
  <text x="60" y="730" class="field-label">Field 2</text>
  <rect x="147" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="227" y="725" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="227" y="745" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <rect x="327" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="407" y="725" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="407" y="745" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <rect x="507" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="587" y="725" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="587" y="745" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <rect x="687" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="767" y="725" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="767" y="745" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <rect x="867" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="947" y="725" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="947" y="745" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <!-- ==================== STEP 4: Edit Crop Details (Two-Column Tree) ==================== -->
  <rect x="40" y="900" width="56" height="24" rx="12" fill="#C26A1B" />
  <text x="68" y="916" text-anchor="middle" class="badge-text">Step 4</text>
  <text x="106" y="917" class="title">Edit Crop Details</text>

  <!-- Two-column container -->
  <rect x="40" y="940" width="1120" height="790" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />

  <!-- LEFT COLUMN: Tree View (~25%) -->
  <rect x="40" y="940" width="280" height="790" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1" />
  <!-- Cover right corners so only left side is rounded -->
  <rect x="310" y="940" width="10" height="790" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="0" />

  <text x="60" y="972" class="tree-header">Fields &amp; Crops</text>
  <line x1="50" y1="982" x2="310" y2="982" stroke="#D1D5DB" stroke-width="1" />

  <!-- Field 1 tree -->
  <text x="60" y="1008" class="field-label">Field 1</text>

  <!-- 1907 Wheat -->
  <text x="75" y="1032" class="tree-item">1907 Wheat</text>
  <text x="90" y="1052" class="tree-cover">&#x2514; &#x1F331; Rapeseed</text>

  <!-- 1908 DryPeas -->
  <text x="75" y="1076" class="tree-item">1908 DryPeas</text>
  <!-- SELECTED item: PigeonBean cover crop -->
  <rect x="55" y="1083" width="250" height="22" rx="4" fill="#E8F0FE" />
  <text x="90" y="1098" class="tree-cover" font-weight="600">&#x2514; &#x1F331; PigeonBean</text>

  <!-- 1909 Wheat -->
  <text x="75" y="1122" class="tree-item">1909 Wheat</text>
  <text x="90" y="1142" class="tree-cover">&#x2514; &#x1F331; Rapeseed</text>

  <!-- 1910 DryPeas -->
  <text x="75" y="1166" class="tree-item">1910 DryPeas</text>
  <text x="90" y="1186" class="tree-cover">&#x2514; &#x1F331; PigeonBean</text>

  <line x1="50" y1="1200" x2="310" y2="1200" stroke="#D1D5DB" stroke-width="0.5" />

  <!-- Field 2 tree -->
  <text x="60" y="1224" class="field-label">Field 2</text>

  <text x="75" y="1248" class="tree-item">1907 DryPeas</text>
  <text x="90" y="1268" class="tree-cover">&#x2514; &#x1F331; PigeonBean</text>

  <text x="75" y="1292" class="tree-item">1908 Wheat</text>
  <text x="90" y="1312" class="tree-cover">&#x2514; &#x1F331; Rapeseed</text>

  <text x="75" y="1336" class="tree-item">1909 DryPeas</text>
  <text x="90" y="1356" class="tree-cover">&#x2514; &#x1F331; PigeonBean</text>

  <!-- Legend -->
  <line x1="50" y1="1400" x2="310" y2="1400" stroke="#D1D5DB" stroke-width="1" />
  <text x="60" y="1420" font-size="10" fill="#6B7280">Legend:</text>
  <text x="60" y="1438" font-size="10" fill="#1F2937">Normal text = Main crop</text>
  <text x="60" y="1456" font-size="10" fill="#4CAF50">Green text = Cover crop</text>

  <!-- Vertical divider -->
  <line x1="320" y1="940" x2="320" y2="1730" stroke="#D1D5DB" stroke-width="1" />

  <!-- RIGHT COLUMN: Editor Panel (~75%) -->
  <!-- Blue header -->
  <rect x="320" y="940" width="840" height="44" fill="#26428B" />
  <rect x="1152" y="940" width="8" height="44" rx="8" fill="#26428B" />
  <text x="340" y="968" class="header-text">&#x1F331; PigeonBean (Cover Crop)</text>
  <!-- Breadcrumb -->
  <text x="340" y="1000" font-size="12" fill="#6B7280">Field 1  &#x203A;  1908 DryPeas  &#x203A;  Cover Crop</text>

  <!-- Tab strip -->
  <line x1="340" y1="1025" x2="1140" y2="1025" stroke="#D1D5DB" stroke-width="1" />
  <text x="356" y="1018" class="tab-active">General</text>
  <rect x="340" y="1023" width="55" height="3" fill="#26428B" />
  <text x="430" y="1018" class="tab-text">Fertilizer</text>
  <text x="510" y="1018" class="tab-text">Manure</text>
  <text x="580" y="1018" class="tab-text">Grazing</text>
  <text x="645" y="1018" class="tab-text">Soil</text>
  <text x="695" y="1018" class="tab-text">Residue</text>
  <text x="775" y="1018" class="tab-text">Economics</text>

  <!-- Form fields (2-column layout within right panel) -->
  <text x="340" y="1060" class="label">Yield (kg/ha)</text>
  <rect x="340" y="1068" width="370" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="350" y="1090" class="value">1800</text>

  <text x="740" y="1060" class="label">Dry yield (kg/ha)</text>
  <rect x="740" y="1068" width="380" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="750" y="1090" class="value">1600</text>

  <text x="340" y="1125" class="label">Moisture (%)</text>
  <rect x="340" y="1133" width="370" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="350" y="1155" class="value">12.0</text>

  <text x="740" y="1125" class="label">Tillage type</text>
  <rect x="740" y="1133" width="380" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="750" y="1155" class="value">No-Till</text>
  <text x="1100" y="1155" class="small">&#x25BC;</text>

  <text x="340" y="1190" class="label">Harvest method</text>
  <rect x="340" y="1198" width="370" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="350" y="1220" class="value">Swathing</text>
  <text x="690" y="1220" class="small">&#x25BC;</text>

  <text x="740" y="1190" class="label">Irrigation</text>
  <rect x="740" y="1198" width="380" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="750" y="1220" class="value">Rainfed</text>
  <text x="1100" y="1220" class="small">&#x25BC;</text>

  <text x="340" y="1255" class="label">Pesticide passes</text>
  <rect x="340" y="1263" width="370" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="350" y="1285" class="value">1</text>

  <!-- Copy checkbox -->
  <rect x="340" y="1320" width="14" height="14" rx="2" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="362" y="1332" class="label">Copy to similar crops</text>

  <!-- Annotation -->
  <rect x="40" y="1745" width="1120" height="40" rx="6" fill="#FFF7ED" stroke="#C26A1B" stroke-width="1" stroke-dasharray="4,3" />
  <text x="600" y="1770" text-anchor="middle" class="annotation">Click any item in the tree. Main crops and cover crops are separate nodes -- no toggle needed.</text>

  <!-- ==================== EXPLANATORY TEXT SECTION ==================== -->
  <rect x="40" y="1810" width="1120" height="470" rx="8" fill="#F0F0F0" />

  <!-- Current State -->
  <text x="60" y="1845" font-size="15" font-weight="700" fill="#1F2937" font-family="Segoe UI, Arial, sans-serif">Current State</text>
  <text x="60" y="1870" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">Currently, Step 4 displays a large blue 'Currently editing' banner, a 'Copy to Similar Crops'</text>
  <text x="60" y="1888" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">toggle section, a cover crop toggle switch with instructional text, and the full set of property</text>
  <text x="60" y="1906" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">tabs -- all stacked vertically. When a cover crop is present, the user must use a toggle switch to</text>
  <text x="60" y="1924" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">swap between editing the main crop and cover crop properties. This creates a tall, cluttered layout</text>
  <text x="60" y="1942" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">that pushes the actual input fields far down the page.</text>

  <!-- Separator -->
  <line x1="60" y1="1962" x2="1140" y2="1962" stroke="#D1D5DB" stroke-width="1" />

  <!-- Proposed Change -->
  <text x="60" y="1990" font-size="15" font-weight="700" fill="#26428B" font-family="Segoe UI, Arial, sans-serif">Proposed Change</text>
  <text x="60" y="2015" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">This design replaces the toggle switch with a hierarchical tree sidebar. All fields, crops, and</text>
  <text x="60" y="2033" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">cover crops are listed as a navigable tree -- cover crops appear as green-tinted child nodes under</text>
  <text x="60" y="2051" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">their parent crop. Clicking any item in the tree immediately loads its properties in the editor</text>
  <text x="60" y="2069" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">panel on the right. No toggle is needed because main crops and cover crops are distinct, clickable</text>
  <text x="60" y="2087" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">items in the tree. This is especially useful for rotations with many fields, as users can quickly</text>
  <text x="60" y="2105" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">jump between any crop across any field.</text>
</svg>