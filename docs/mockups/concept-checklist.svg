<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2400" viewBox="0 0 1200 2400">
  <defs>
    <style>
      .title-font { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: bold; fill: #1F2937; }
      .label-font { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1F2937; }
      .small-font { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; }
      .badge-text { font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: bold; fill: #FFFFFF; }
      .header-text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: bold; fill: #FFFFFF; }
      .field-value { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1F2937; }
      .section-title { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: bold; fill: #1F2937; }
      .stakeholder-title { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: bold; fill: #1F2937; }
      .stakeholder-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #374151; }
      .card-title { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: bold; fill: #1F2937; }
      .card-desc { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #6B7280; }
      .note-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #6B7280; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="2400" fill="#F9FAFB"/>

  <!-- ==================== STEP 1 (y=20) ==================== -->
  <rect x="30" y="20" width="1140" height="140" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="35" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="50" text-anchor="middle" class="badge-text">Step 1</text>
  <text x="115" y="51" class="title-font">Rotation Overview</text>

  <text x="60" y="85" class="label-font" font-weight="bold">Name:</text>
  <text x="108" y="85" class="field-value">Crop Rotation test</text>
  <text x="290" y="85" class="label-font" font-weight="bold">Start:</text>
  <text x="330" y="85" class="field-value">1907</text>
  <text x="400" y="85" class="label-font" font-weight="bold">End:</text>
  <text x="432" y="85" class="field-value">2026</text>
  <text x="500" y="85" class="label-font" font-weight="bold">Field size:</text>
  <text x="565" y="85" class="field-value">50 ha</text>

  <rect x="100" y="100" width="170" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="110" y="120" class="field-value">Crop Rotation test</text>
  <rect x="320" y="100" width="60" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="330" y="120" class="field-value">1907</text>
  <rect x="420" y="100" width="60" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="430" y="120" class="field-value">2026</text>
  <rect x="540" y="100" width="70" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="550" y="120" class="field-value">50 ha</text>

  <!-- ==================== STEP 2 (y=180) ==================== -->
  <rect x="30" y="180" width="1140" height="250" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="195" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="210" text-anchor="middle" class="badge-text">Step 2</text>
  <text x="115" y="211" class="title-font">Build Your Rotation Sequence</text>

  <rect x="50" y="230" width="110" height="30" rx="5" fill="#26428B"/>
  <text x="105" y="250" text-anchor="middle" class="header-text">+ Add Crop</text>
  <text x="180" y="250" class="small-font">Crops in sequence: 2</text>

  <rect x="50" y="270" width="520" height="65" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="65" y="295" class="label-font" font-weight="bold">1907</text>
  <rect x="110" y="280" width="80" height="24" rx="4" fill="#E8F0FE"/>
  <text x="150" y="296" text-anchor="middle" class="label-font">Wheat</text>
  <text x="210" y="296" class="small-font">Cover crop:</text>
  <rect x="280" y="280" width="90" height="24" rx="4" fill="#E8F4E8"/>
  <text x="325" y="296" text-anchor="middle" style="font-family:Arial;font-size:12px;fill:#4CAF50">Rapeseed</text>

  <rect x="50" y="345" width="520" height="65" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="65" y="370" class="label-font" font-weight="bold">1908</text>
  <rect x="110" y="355" width="80" height="24" rx="4" fill="#E8F0FE"/>
  <text x="150" y="371" text-anchor="middle" class="label-font">DryPeas</text>
  <text x="210" y="371" class="small-font">Cover crop:</text>
  <rect x="280" y="355" width="100" height="24" rx="4" fill="#E8F4E8"/>
  <text x="330" y="371" text-anchor="middle" style="font-family:Arial;font-size:12px;fill:#4CAF50">PigeonBean</text>

  <!-- ==================== STEP 3 (y=450) ==================== -->
  <rect x="30" y="450" width="1140" height="380" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="465" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="480" text-anchor="middle" class="badge-text">Step 3</text>
  <text x="115" y="481" class="title-font">Preview Field Assignments</text>

  <rect x="50" y="505" width="1100" height="30" rx="0" fill="#26428B"/>
  <text x="100" y="525" class="header-text">Field</text>
  <text x="230" y="525" text-anchor="middle" class="header-text">1907</text>
  <text x="380" y="525" text-anchor="middle" class="header-text">1908</text>
  <text x="530" y="525" text-anchor="middle" class="header-text">1909</text>
  <text x="680" y="525" text-anchor="middle" class="header-text">1910</text>
  <text x="830" y="525" text-anchor="middle" class="header-text">1911</text>

  <rect x="50" y="540" width="100" height="120" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="100" y="605" text-anchor="middle" class="label-font" font-weight="bold">Field 1</text>

  <rect x="155" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="227" y="575" text-anchor="middle" class="label-font" font-weight="bold">Wheat</text>
  <text x="227" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: Rapeseed</text>

  <rect x="305" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="377" y="575" text-anchor="middle" class="label-font" font-weight="bold">DryPeas</text>
  <text x="377" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: PigeonBean</text>

  <rect x="455" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="527" y="575" text-anchor="middle" class="label-font" font-weight="bold">Wheat</text>
  <text x="527" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: Rapeseed</text>

  <rect x="605" y="540" width="145" height="120" fill="#E8F0FE" stroke="#26428B" stroke-width="2"/>
  <text x="677" y="575" text-anchor="middle" class="label-font" font-weight="bold">DryPeas</text>
  <text x="677" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: PigeonBean</text>

  <rect x="755" y="540" width="145" height="120" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="827" y="575" text-anchor="middle" class="label-font" font-weight="bold">Wheat</text>
  <text x="827" y="600" text-anchor="middle" style="font-family:Arial;font-size:11px;fill:#4CAF50">Cover: Rapeseed</text>

  <rect x="50" y="665" width="100" height="60" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="100" y="700" text-anchor="middle" class="label-font" font-weight="bold">Field 2</text>
  <rect x="155" y="665" width="745" height="60" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="527" y="700" text-anchor="middle" class="small-font">No crops assigned</text>

  <!-- Divider -->
  <line x1="30" y1="845" x2="1170" y2="845" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- ==================== STEP 4 (y=860) — CHECKLIST TOGGLE CARDS ==================== -->
  <rect x="30" y="860" width="1140" height="1340" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="50" y="875" width="55" height="22" rx="11" fill="#C26A1B"/>
  <text x="77" y="890" text-anchor="middle" class="badge-text">Step 4</text>
  <text x="115" y="891" class="title-font">Edit Crop Details</text>

  <!-- Currently editing header -->
  <rect x="50" y="910" width="1100" height="36" rx="6" fill="#E8F0FE" stroke="#26428B" stroke-width="1"/>
  <text x="65" y="933" style="font-family:Arial;font-size:14px;font-weight:bold;fill:#26428B">DryPeas (1910) — Field 1 | Main Crop &#x25BC;</text>

  <!-- ====== TOGGLE CARD GRID ====== -->
  <!-- Row 1 -->
  <!-- Card: General - ACTIVE (blue border, always on) -->
  <rect x="50" y="965" width="340" height="95" rx="8" fill="#FFFFFF" stroke="#26428B" stroke-width="2"/>
  <!-- Blue checkmark circle -->
  <circle cx="80" cy="990" r="12" fill="#26428B"/>
  <text x="80" y="995" text-anchor="middle" style="font-family:Arial;font-size:13px;fill:#FFFFFF;font-weight:bold">&#x2713;</text>
  <text x="100" y="995" class="card-title">General</text>
  <text x="320" y="995" text-anchor="end" style="font-family:Arial;font-size:10px;fill:#26428B;font-style:italic">Always on</text>
  <text x="70" y="1020" class="card-desc">Yield, moisture, tillage</text>
  <text x="70" y="1040" style="font-family:Arial;font-size:11px;fill:#26428B">Required for all crops</text>

  <!-- Card: Fertilizer - ACTIVE (green border, toggle ON) -->
  <rect x="410" y="965" width="340" height="95" rx="8" fill="#FFFFFF" stroke="#4CAF50" stroke-width="2"/>
  <!-- Toggle ON -->
  <rect x="700" y="978" width="36" height="18" rx="9" fill="#4CAF50"/>
  <circle cx="726" cy="987" r="7" fill="#FFFFFF"/>
  <text x="440" y="995" class="card-title">Fertilizer</text>
  <text x="430" y="1020" class="card-desc">Fertilizer type, rate, application</text>

  <!-- Card: Manure - INACTIVE -->
  <rect x="770" y="965" width="340" height="95" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <!-- Toggle OFF -->
  <rect x="1060" y="978" width="36" height="18" rx="9" fill="#9CA3AF"/>
  <circle cx="1070" cy="987" r="7" fill="#FFFFFF"/>
  <text x="800" y="995" class="card-title" style="fill:#9CA3AF">Manure</text>
  <text x="790" y="1020" class="card-desc">Manure type, amount, timing</text>

  <!-- Row 2 -->
  <!-- Card: Grazing - INACTIVE -->
  <rect x="50" y="1075" width="340" height="95" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="340" y="1088" width="36" height="18" rx="9" fill="#9CA3AF"/>
  <circle cx="350" cy="1097" r="7" fill="#FFFFFF"/>
  <text x="80" y="1105" class="card-title" style="fill:#9CA3AF">Grazing</text>
  <text x="70" y="1130" class="card-desc">Grazing intensity, duration</text>

  <!-- Card: Soil - INACTIVE -->
  <rect x="410" y="1075" width="340" height="95" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="700" y="1088" width="36" height="18" rx="9" fill="#9CA3AF"/>
  <circle cx="710" cy="1097" r="7" fill="#FFFFFF"/>
  <text x="440" y="1105" class="card-title" style="fill:#9CA3AF">Soil</text>
  <text x="430" y="1130" class="card-desc">Texture, organic matter, pH</text>

  <!-- Card: Residue - INACTIVE -->
  <rect x="770" y="1075" width="340" height="95" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="1060" y="1088" width="36" height="18" rx="9" fill="#9CA3AF"/>
  <circle cx="1070" cy="1097" r="7" fill="#FFFFFF"/>
  <text x="800" y="1105" class="card-title" style="fill:#9CA3AF">Residue</text>
  <text x="790" y="1130" class="card-desc">Residue management, decomposition</text>

  <!-- Row 3 -->
  <!-- Card: Economics - INACTIVE -->
  <rect x="50" y="1185" width="340" height="95" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <rect x="340" y="1198" width="36" height="18" rx="9" fill="#9CA3AF"/>
  <circle cx="350" cy="1207" r="7" fill="#FFFFFF"/>
  <text x="80" y="1215" class="card-title" style="fill:#9CA3AF">Economics</text>
  <text x="70" y="1240" class="card-desc">Revenue, costs, profit analysis</text>

  <!-- Subtle note -->
  <text x="50" y="1310" class="note-text">Toggle on the categories relevant to your operation. Only active categories show input fields below.</text>

  <!-- ====== EXPANDED: General Properties ====== -->
  <rect x="50" y="1335" width="1100" height="160" rx="6" fill="#FFFFFF" stroke="#26428B" stroke-width="1"/>
  <rect x="50" y="1335" width="1100" height="30" rx="6" fill="#26428B"/>
  <rect x="50" y="1350" width="1100" height="15" fill="#26428B"/>
  <text x="70" y="1355" style="font-family:Arial;font-size:14px;font-weight:bold;fill:#FFFFFF">General Properties</text>

  <!-- Form row 1 -->
  <text x="65" y="1395" class="label-font">Yield</text>
  <rect x="65" y="1403" width="120" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="75" y="1422" class="field-value">1000.0</text>
  <text x="192" y="1422" class="small-font">kg/ha</text>

  <text x="250" y="1395" class="label-font">Dry yield</text>
  <rect x="250" y="1403" width="100" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="260" y="1422" class="field-value">0.00</text>

  <text x="380" y="1395" class="label-font">Moisture</text>
  <rect x="380" y="1403" width="80" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="390" y="1422" class="field-value">12.0</text>
  <text x="467" y="1422" class="small-font">%</text>

  <text x="510" y="1395" class="label-font">Tillage</text>
  <rect x="510" y="1403" width="120" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="520" y="1422" class="field-value">Reduced &#x25BC;</text>

  <!-- Form row 2 -->
  <text x="65" y="1455" class="label-font">Harvest</text>
  <rect x="65" y="1463" width="130" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="75" y="1482" class="field-value">Cash crop &#x25BC;</text>

  <text x="250" y="1455" class="label-font">Irrigation</text>
  <rect x="250" y="1463" width="100" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="260" y="1482" class="field-value">0.0</text>
  <text x="357" y="1482" class="small-font">mm</text>

  <text x="410" y="1455" class="label-font">Pesticide passes</text>
  <rect x="410" y="1463" width="70" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="420" y="1482" class="field-value">0</text>

  <!-- ====== EXPANDED: Fertilizer ====== -->
  <rect x="50" y="1510" width="1100" height="110" rx="6" fill="#FFFFFF" stroke="#4CAF50" stroke-width="1"/>
  <rect x="50" y="1510" width="1100" height="30" rx="6" fill="#4CAF50"/>
  <rect x="50" y="1525" width="1100" height="15" fill="#4CAF50"/>
  <text x="70" y="1530" style="font-family:Arial;font-size:14px;font-weight:bold;fill:#FFFFFF">Fertilizer</text>

  <text x="65" y="1570" class="label-font">Fertilizer type</text>
  <rect x="65" y="1578" width="150" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="75" y="1597" class="field-value">Urea &#x25BC;</text>

  <text x="250" y="1570" class="label-font">Rate</text>
  <rect x="250" y="1578" width="110" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="260" y="1597" class="field-value">50.0</text>
  <text x="367" y="1597" class="small-font">kg/ha</text>

  <text x="420" y="1570" class="label-font">Season</text>
  <rect x="420" y="1578" width="130" height="28" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="430" y="1597" class="field-value">Spring &#x25BC;</text>

  <!-- ==================== STAKEHOLDER TEXT ==================== -->
  <rect x="30" y="1660" width="1140" height="290" rx="8" fill="#FFF8F0" stroke="#C26A1B" stroke-width="1"/>
  <text x="50" y="1690" class="stakeholder-title">Current State:</text>
  <text x="50" y="1710" class="stakeholder-text">Currently, Step 4 shows all 7 tabs simultaneously (General, Fertilizer, Manure, Grazing, Soil, Residue,</text>
  <text x="50" y="1728" class="stakeholder-text">Economics), regardless of whether the user needs them. Users must scroll through many irrelevant input fields.</text>

  <text x="50" y="1760" class="stakeholder-title">Proposed Change:</text>
  <text x="50" y="1780" class="stakeholder-text">This checklist approach presents all 7 categories as compact toggle cards in a grid. Users can quickly see all</text>
  <text x="50" y="1798" class="stakeholder-text">available categories and toggle on only the ones relevant to their operation. Active cards expand their input</text>
  <text x="50" y="1816" class="stakeholder-text">fields below the grid. Inactive cards remain compact one-liners. This gives users control over complexity</text>
  <text x="50" y="1834" class="stakeholder-text">while maintaining discoverability of all available options.</text>
</svg>