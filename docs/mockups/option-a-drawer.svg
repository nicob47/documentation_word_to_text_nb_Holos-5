<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="2280" viewBox="0 0 1200 2280">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 18px; font-weight: 600; fill: #1F2937; }
      .subtitle { font-size: 14px; fill: #6B7280; }
      .label { font-size: 13px; fill: #1F2937; }
      .value { font-size: 13px; fill: #6B7280; }
      .small { font-size: 11px; fill: #6B7280; }
      .badge-text { font-size: 12px; fill: #FFFFFF; font-weight: 700; }
      .crop-name { font-size: 13px; font-weight: 600; fill: #1F2937; }
      .cover-crop { font-size: 11px; fill: #4CAF50; font-style: italic; }
      .year-text { font-size: 11px; fill: #6B7280; }
      .tab-text { font-size: 13px; fill: #6B7280; }
      .tab-active { font-size: 13px; fill: #26428B; font-weight: 600; }
      .field-label { font-size: 13px; fill: #1F2937; font-weight: 600; }
      .btn-text { font-size: 13px; fill: #FFFFFF; font-weight: 600; }
      .header-text { font-size: 16px; fill: #FFFFFF; font-weight: 600; }
      .annotation { font-size: 12px; fill: #C26A1B; font-style: italic; }
    </style>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15" />
    </filter>
    <filter id="drawerShadow" x="-10%" y="-2%" width="120%" height="104%">
      <feDropShadow dx="-3" dy="0" stdDeviation="6" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="2280" fill="#F9FAFB" />

  <!-- ==================== STEP 1: Rotation Overview ==================== -->
  <!-- Step badge -->
  <rect x="40" y="20" width="56" height="24" rx="12" fill="#C26A1B" />
  <text x="68" y="36" text-anchor="middle" class="badge-text">Step 1</text>
  <text x="106" y="37" class="title">Rotation Overview</text>

  <!-- Summary card -->
  <rect x="40" y="55" width="1120" height="120" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <!-- Row 1 -->
  <text x="60" y="85" class="label" font-weight="600">Name:</text>
  <text x="110" y="85" class="value">Crop Rotation test</text>
  <text x="340" y="85" class="label" font-weight="600">Start Year:</text>
  <text x="420" y="85" class="value">1907</text>
  <text x="540" y="85" class="label" font-weight="600">End Year:</text>
  <text x="615" y="85" class="value">2026</text>
  <text x="740" y="85" class="label" font-weight="600">Field Size:</text>
  <text x="815" y="85" class="value">50 ha</text>

  <!-- ==================== STEP 2: Build Your Rotation Sequence ==================== -->
  <rect x="40" y="200" width="56" height="24" rx="12" fill="#C26A1B" />
  <text x="68" y="216" text-anchor="middle" class="badge-text">Step 2</text>
  <text x="106" y="217" class="title">Build Your Rotation Sequence</text>

  <!-- Add Crop button + count -->
  <rect x="40" y="240" width="110" height="32" rx="6" fill="#26428B" />
  <text x="95" y="261" text-anchor="middle" class="btn-text">+ Add Crop</text>
  <text x="170" y="261" class="subtitle">Crops in sequence: 2</text>

  <!-- Rotation Timeline label -->
  <text x="40" y="300" class="label" font-weight="600">Rotation Timeline</text>

  <!-- Card 1: 1907 Wheat -->
  <rect x="40" y="312" width="520" height="160" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="60" y="338" class="year-text">Year: 1907</text>

  <text x="60" y="365" class="label">Select crop</text>
  <rect x="60" y="372" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="70" y="392" class="value">Wheat</text>
  <text x="240" y="392" class="small">&#x25BC;</text>

  <rect x="60" y="415" width="14" height="14" rx="2" fill="#26428B" stroke="#26428B" stroke-width="1" />
  <text x="62" y="426" font-size="10" fill="#FFFFFF" font-weight="700">&#x2713;</text>
  <text x="82" y="427" class="label">Cover Crop</text>

  <text x="60" y="452" class="label">Cover Crop Type</text>
  <rect x="60" y="458" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="70" y="478" class="value">Rapeseed</text>
  <text x="240" y="478" class="small">&#x25BC;</text>

  <!-- Card 2: 1908 DryPeas -->
  <rect x="580" y="312" width="520" height="160" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="600" y="338" class="year-text">Year: 1908</text>

  <text x="600" y="365" class="label">Select crop</text>
  <rect x="600" y="372" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="610" y="392" class="value">DryPeas</text>
  <text x="780" y="392" class="small">&#x25BC;</text>

  <rect x="600" y="415" width="14" height="14" rx="2" fill="#26428B" stroke="#26428B" stroke-width="1" />
  <text x="602" y="426" font-size="10" fill="#FFFFFF" font-weight="700">&#x2713;</text>
  <text x="622" y="427" class="label">Cover Crop</text>

  <text x="600" y="452" class="label">Cover Crop Type</text>
  <rect x="600" y="458" width="200" height="30" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="610" y="478" class="value">PigeonBean</text>
  <text x="780" y="478" class="small">&#x25BC;</text>

  <!-- Delete button on card 2 -->
  <rect x="1040" y="322" width="50" height="26" rx="4" fill="#FEE2E2" />
  <text x="1065" y="340" text-anchor="middle" font-size="12" fill="#DC2626" font-weight="600">Delete</text>

  <!-- ==================== STEP 3: Preview Field Assignments ==================== -->
  <rect x="40" y="510" width="56" height="24" rx="12" fill="#C26A1B" />
  <text x="68" y="526" text-anchor="middle" class="badge-text">Step 3</text>
  <text x="106" y="527" class="title">Preview Field Assignments</text>

  <!-- Grid container -->
  <rect x="40" y="550" width="1120" height="300" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />

  <!-- Column headers -->
  <text x="60" y="580" class="label" font-weight="600">Field</text>
  <text x="227" y="575" text-anchor="middle" class="year-text">1907</text>
  <text x="407" y="575" text-anchor="middle" class="year-text">1908</text>
  <text x="587" y="575" text-anchor="middle" class="year-text">1909</text>
  <text x="767" y="575" text-anchor="middle" class="year-text">1910</text>
  <text x="947" y="575" text-anchor="middle" class="year-text">1911</text>

  <!-- Separator line -->
  <line x1="40" y1="590" x2="1160" y2="590" stroke="#D1D5DB" stroke-width="1" />

  <!-- Field 1 row -->
  <text x="60" y="630" class="field-label">Field 1</text>

  <!-- 1907 Wheat/Rapeseed -->
  <rect x="147" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="227" y="625" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="227" y="645" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <!-- 1908 DryPeas/PigeonBean -->
  <rect x="327" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="407" y="625" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="407" y="645" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <!-- 1909 Wheat/Rapeseed -->
  <rect x="507" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="587" y="625" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="587" y="645" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <!-- 1910 DryPeas/PigeonBean SELECTED -->
  <rect x="687" y="600" width="160" height="70" rx="6" fill="#E8F0FE" stroke="#26428B" stroke-width="2" />
  <text x="767" y="625" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="767" y="645" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <!-- 1911 Wheat/Rapeseed -->
  <rect x="867" y="600" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="947" y="625" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="947" y="645" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <!-- Separator -->
  <line x1="50" y1="685" x2="1150" y2="685" stroke="#D1D5DB" stroke-width="1" />

  <!-- Field 2 row (offset by 1 year) -->
  <text x="60" y="730" class="field-label">Field 2</text>

  <!-- 1907 DryPeas/PigeonBean -->
  <rect x="147" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="227" y="725" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="227" y="745" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <!-- 1908 Wheat/Rapeseed -->
  <rect x="327" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="407" y="725" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="407" y="745" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <!-- 1909 DryPeas/PigeonBean -->
  <rect x="507" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="587" y="725" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="587" y="745" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <!-- 1910 Wheat/Rapeseed -->
  <rect x="687" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="767" y="725" text-anchor="middle" class="crop-name">Wheat</text>
  <text x="767" y="745" text-anchor="middle" class="cover-crop">Rapeseed</text>

  <!-- 1911 DryPeas/PigeonBean -->
  <rect x="867" y="700" width="160" height="70" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="947" y="725" text-anchor="middle" class="crop-name">DryPeas</text>
  <text x="947" y="745" text-anchor="middle" class="cover-crop">PigeonBean</text>

  <!-- ==================== STEP 4: Slide-out Drawer ==================== -->
  <!-- Annotation arrow -->
  <text x="40" y="890" class="annotation">&#x25BC; When a grid cell is clicked, a drawer slides in from the right:</text>

  <!-- Split layout container -->
  <rect x="40" y="910" width="1120" height="850" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />

  <!-- LEFT SIDE: Mini grid (~55%) -->
  <text x="60" y="945" class="label" font-weight="600">Field</text>
  <text x="155" y="940" text-anchor="middle" class="year-text">1907</text>
  <text x="268" y="940" text-anchor="middle" class="year-text">1908</text>
  <text x="381" y="940" text-anchor="middle" class="year-text">1909</text>
  <text x="494" y="940" text-anchor="middle" class="year-text">1910</text>

  <line x1="50" y1="952" x2="580" y2="952" stroke="#D1D5DB" stroke-width="1" />

  <!-- Field 1 mini cells -->
  <text x="60" y="988" class="field-label">Field 1</text>
  <rect x="110" y="960" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="160" y="983" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">Wheat</text>
  <text x="160" y="998" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">Rapeseed</text>

  <rect x="223" y="960" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="273" y="983" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">DryPeas</text>
  <text x="273" y="998" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">PigeonBean</text>

  <rect x="336" y="960" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="386" y="983" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">Wheat</text>
  <text x="386" y="998" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">Rapeseed</text>

  <rect x="449" y="960" width="100" height="50" rx="4" fill="#E8F0FE" stroke="#26428B" stroke-width="2" />
  <text x="499" y="983" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">DryPeas</text>
  <text x="499" y="998" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">PigeonBean</text>

  <!-- Field 2 mini cells -->
  <line x1="50" y1="1020" x2="580" y2="1020" stroke="#D1D5DB" stroke-width="0.5" />
  <text x="60" y="1058" class="field-label">Field 2</text>
  <rect x="110" y="1030" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="160" y="1053" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">DryPeas</text>
  <text x="160" y="1068" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">PigeonBean</text>

  <rect x="223" y="1030" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="273" y="1053" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">Wheat</text>
  <text x="273" y="1068" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">Rapeseed</text>

  <rect x="336" y="1030" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="386" y="1053" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">DryPeas</text>
  <text x="386" y="1068" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">PigeonBean</text>

  <rect x="449" y="1030" width="100" height="50" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="499" y="1053" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">Wheat</text>
  <text x="499" y="1068" text-anchor="middle" font-size="9" fill="#4CAF50" font-style="italic">Rapeseed</text>

  <!-- RIGHT SIDE: Drawer panel (~45%) -->
  <rect x="600" y="910" width="560" height="850" rx="0" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#drawerShadow)" />

  <!-- Drawer blue header -->
  <rect x="600" y="910" width="560" height="44" fill="#26428B" />
  <text x="620" y="938" class="header-text">DryPeas (1910) -- Field 1</text>
  <text x="1130" y="938" text-anchor="middle" font-size="18" fill="#FFFFFF" font-weight="300">&#x2715;</text>

  <!-- Pill toggle -->
  <rect x="620" y="968" width="250" height="32" rx="16" fill="#F3F4F6" />
  <rect x="622" y="970" width="120" height="28" rx="14" fill="#26428B" />
  <text x="682" y="989" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="600">Main Crop</text>
  <text x="805" y="989" text-anchor="middle" font-size="12" fill="#6B7280">Cover Crop</text>

  <!-- Tab strip -->
  <line x1="620" y1="1025" x2="1140" y2="1025" stroke="#D1D5DB" stroke-width="1" />
  <text x="636" y="1018" class="tab-active">General</text>
  <rect x="620" y="1023" width="55" height="3" fill="#26428B" />
  <text x="710" y="1018" class="tab-text">Fertilizer</text>
  <text x="790" y="1018" class="tab-text">Manure</text>
  <text x="860" y="1018" class="tab-text">Grazing</text>
  <text x="925" y="1018" class="tab-text">Soil</text>
  <text x="975" y="1018" class="tab-text">Residue</text>
  <text x="1055" y="1018" class="tab-text">Economics</text>

  <!-- Form fields -->
  <text x="620" y="1060" class="label">Yield (kg/ha)</text>
  <rect x="620" y="1068" width="240" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="630" y="1090" class="value">3200</text>

  <text x="880" y="1060" class="label">Dry yield (kg/ha)</text>
  <rect x="880" y="1068" width="240" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="890" y="1090" class="value">2800</text>

  <text x="620" y="1125" class="label">Moisture (%)</text>
  <rect x="620" y="1133" width="240" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="630" y="1155" class="value">14.0</text>

  <text x="880" y="1125" class="label">Tillage type</text>
  <rect x="880" y="1133" width="240" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="890" y="1155" class="value">Reduced Tillage</text>
  <text x="1100" y="1155" class="small">&#x25BC;</text>

  <text x="620" y="1190" class="label">Harvest method</text>
  <rect x="620" y="1198" width="240" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="630" y="1220" class="value">Combine</text>
  <text x="840" y="1220" class="small">&#x25BC;</text>

  <text x="880" y="1190" class="label">Irrigation</text>
  <rect x="880" y="1198" width="240" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="890" y="1220" class="value">Rainfed</text>
  <text x="1100" y="1220" class="small">&#x25BC;</text>

  <text x="620" y="1255" class="label">Pesticide passes</text>
  <rect x="620" y="1263" width="240" height="32" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="630" y="1285" class="value">2</text>

  <!-- Copy checkbox -->
  <rect x="620" y="1320" width="14" height="14" rx="2" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" />
  <text x="642" y="1332" class="label">Copy to similar crops</text>

  <!-- Annotation -->
  <rect x="40" y="1730" width="1120" height="40" rx="6" fill="#FFF7ED" stroke="#C26A1B" stroke-width="1" stroke-dasharray="4,3" />
  <text x="600" y="1755" text-anchor="middle" class="annotation">Drawer slides in from the right when a grid cell is clicked. The grid remains visible and interactive on the left.</text>

  <!-- ==================== EXPLANATORY TEXT SECTION ==================== -->
  <rect x="40" y="1800" width="1120" height="440" rx="8" fill="#F0F0F0" />

  <!-- Current State -->
  <text x="60" y="1835" font-size="15" font-weight="700" fill="#1F2937" font-family="Segoe UI, Arial, sans-serif">Current State</text>
  <text x="60" y="1860" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">Currently, Step 4 displays a large blue 'Currently editing' banner, a 'Copy to Similar Crops'</text>
  <text x="60" y="1878" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">toggle section, a cover crop toggle switch with instructional text, and the full set of property</text>
  <text x="60" y="1896" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">tabs -- all stacked vertically. When a cover crop is present, the user must use a toggle switch to</text>
  <text x="60" y="1914" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">swap between editing the main crop and cover crop properties. This creates a tall, cluttered layout</text>
  <text x="60" y="1932" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">that pushes the actual input fields far down the page.</text>

  <!-- Separator -->
  <line x1="60" y1="1952" x2="1140" y2="1952" stroke="#D1D5DB" stroke-width="1" />

  <!-- Proposed Change -->
  <text x="60" y="1980" font-size="15" font-weight="700" fill="#26428B" font-family="Segoe UI, Arial, sans-serif">Proposed Change</text>
  <text x="60" y="2005" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">This design eliminates Step 4 as a separate section. Instead, clicking any cell in the preview grid</text>
  <text x="60" y="2023" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">opens a slide-out drawer panel on the right side. The preview grid remains visible and interactive</text>
  <text x="60" y="2041" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">on the left, so users maintain context of where they are in the rotation. The drawer contains a</text>
  <text x="60" y="2059" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">compact pill toggle to switch between Main Crop and Cover Crop editing, followed by the property</text>
  <text x="60" y="2077" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">tabs. Users can click different cells in the grid to quickly navigate between crops without closing</text>
  <text x="60" y="2095" font-size="13" fill="#4B5563" font-family="Segoe UI, Arial, sans-serif">the drawer.</text>
</svg>