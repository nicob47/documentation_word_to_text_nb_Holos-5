name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (.NET 9 / Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Holos.sln

      - name: Build
        run: dotnet build Holos.sln --no-restore --configuration Release

      - name: Test — H.CLI.Test
        run: >
          dotnet test H.CLI.Test/H.CLI.Test.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=H.CLI.Test.trx"
          --results-directory TestResults

      - name: Test — H.Core.Test
        run: >
          dotnet test H.Core.Test/H.Core.Test.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=H.Core.Test.trx"
          --results-directory TestResults

      - name: Test — H.Infrastructure.Test
        run: >
          dotnet test H.Infrastructure.Test/H.Infrastructure.Test.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=H.Infrastructure.Test.trx"
          --results-directory TestResults

      - name: Test — H.Avalonia.Test (headless)
        run: >
          dotnet test H.GUI.Avalonia/H.Avalonia.Test/H.Avalonia.Test.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=H.Avalonia.Test.trx"
          --results-directory TestResults

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 30
